name: MixInvent CI/CD - Multi-platform Build

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout do código
        uses: actions/checkout@v4

      - name: 2. Preparar Emulador QEMU (para compilar ARM na nuvem)
        uses: docker/setup-qemu-action@v3

      - name: 3. Preparar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 4. Autenticar no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 5. Compilar (Build) e Enviar (Push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: mixinocencio/mixinvent:latest
