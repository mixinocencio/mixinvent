version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: postgres_ativos
    environment:
      POSTGRES_USER: admin.db
      POSTGRES_PASSWORD: Slackware@198%
      POSTGRES_DB: ativos
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata_ativos:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: backend_ativos
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: admin.db
      DATABASE_PASSWORD: Slackware@198%
      DATABASE_NAME: ativos
      NODE_ENV: development
    ports:
      - "3001:3000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    container_name: frontend_ativos
    environment:
      - CHOKIDAR_USEPOLLING=true
      - PORT=3000
      - REACT_APP_API_URL=http://localhost:3001
    ports:
      - "3002:3000"
    depends_on:
      - backend

volumes:
  pgdata_ativos:
