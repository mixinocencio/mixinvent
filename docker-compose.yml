services:
  db:
    image: postgres:16-alpine
    container_name: mixinvent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mixinvent
      POSTGRES_PASSWORD: mixinvent_dev
      POSTGRES_DB: mixinvent
    volumes:
      - mixinvent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mixinvent -d mixinvent"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build: .
    container_name: mixinvent-app
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://mixinvent:mixinvent_dev@db:5432/mixinvent
    ports:
      - "3000:3000"

volumes:
  mixinvent_pgdata:
